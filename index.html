<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Ayya's space of Spirituality</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        
        h1 {
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .subtitle {
            font-size: 20px;
            color: #34495e;
            margin-bottom: 40px;
            font-weight: bold;
        }

        /* Container for the vertical list of books */
        .book-list {
            max-width: 95%;
            margin: 0 auto;
            text-align: left; 
        }

        /* The collapsible section */
        details {
            background: white;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            overflow: hidden; 
        }

        /* The clickable title */
        summary {
            background-color: #34495e;
            color: white;
            padding: 20px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            list-style: none; /* Hides default small triangle */
        }
        
        summary::-webkit-details-marker {
            display: none; /* Hides default triangle in Chrome/Safari */
        }
        
        summary:hover {
            background-color: #2c3e50;
        }

        /* The PDF iframe */
        iframe {
            width: 100%;
            height: 85vh;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <h1>Welcome to Ayya's space of Spirituality</h1>
    <p class="subtitle">ஐயாவின் ஆன்மீக வெளிக்கு நல்வரவு</p>
    
    <div class="book-list">
        
        <details>
            <summary>📖 1-NAAN Yaar?</summary>
            <iframe src="Dad - 1 compressed.pdf"></iframe>
        </details>

        <details>
            <summary>📖 2-AALAYA VAZHIPATIN MUDIVU</summary>
            <iframe src="Dad - 2 compressed.pdf"></iframe>
        </details>

    </div>

</body>
</html>
